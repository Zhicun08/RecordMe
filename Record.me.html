<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record.me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Nunito:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="ios-frame.jsx?v=20260423-1" type="text/babel"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #1F1E1C;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, system-ui, sans-serif;
  }
  ::-webkit-scrollbar { width: 0px; }
  textarea, input, button { font-family: inherit; }

  /* Tweak panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 24px; right: 24px;
    width: 260px;
    background: rgba(253,248,243,0.97);
    backdrop-filter: blur(20px);
    border: 1px solid #EDE4D8;
    border-radius: 20px;
    padding: 16px 18px 18px;
    box-shadow: 0 8px 40px rgba(61,43,31,0.18);
    z-index: 9999;
    font-family: -apple-system, system-ui, sans-serif;
  }
  #tweaks-panel.visible { display: block; }
  .tweak-title {
    font-size: 13px; font-weight: 700; color: #2D2B28;
    letter-spacing: 0.04em; text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .tweak-section { margin-bottom: 14px; }
  .tweak-label {
    font-size: 11px; font-weight: 600; color: #8B6B55;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 6px; display: flex; justify-content: space-between;
  }
  .tweak-label span { font-weight: 400; color: #C4A898; letter-spacing: 0; text-transform: none; }
  .tweak-slider {
    width: 100%; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: #EDE4D8; border-radius: 2px; outline: none; cursor: pointer;
  }
  .tweak-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #37332E; cursor: pointer;
    box-shadow: 0 1px 4px rgba(45,43,40,0.25);
  }
  .tweak-colors {
    display: flex; gap: 7px; flex-wrap: wrap;
  }
  .tweak-color-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
  }
  .tweak-color-btn.active { border-color: #2D2B28; transform: scale(1.15); }
  .tweak-color-custom {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid #EDE4D8; cursor: pointer;
    overflow: hidden; position: relative;
  }
  .tweak-color-custom input[type=color] {
    position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px);
    border: none; padding: 0; cursor: pointer; opacity: 0;
  }
  .tweak-color-custom-preview {
    width: 100%; height: 100%; border-radius: 50%;
    pointer-events: none;
  }
  .tweak-font-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .tweak-font-btn {
    padding: 7px 8px; border-radius: 10px; border: 1.5px solid #EDE4D8;
    background: #fff; cursor: pointer; text-align: center;
    font-size: 12px; color: #2D2B28; transition: border-color 0.15s, background 0.15s;
  }
  .tweak-font-btn.active {
    border-color: #37332E; background: #EEEBE7; color: #37332E; font-weight: 600;
  }
  .tweak-divider { border: none; border-top: 1px solid #EDE4D8; margin: 12px 0; }
</style>
</head>
<body>

<div id="mount"></div>

<!-- Tweaks panel (plain HTML, outside React) -->
<div id="tweaks-panel">
  <div class="tweak-title">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="3" fill="#37332E"/>
      <path d="M12 2V6M12 18V22M4.22 4.22L7.05 7.05M16.95 16.95L19.78 19.78M2 12H6M18 12H22M4.22 19.78L7.05 16.95M16.95 7.05L19.78 4.22" stroke="#37332E" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Tweaks
  </div>

  <!-- Accent color -->
  <div class="tweak-section">
    <div class="tweak-label">Accent Color</div>
    <div class="tweak-colors" id="tweak-colors">
      <button class="tweak-color-btn active" data-color="#93B89C" style="background:#93B89C" title="Sage"></button>
      <button class="tweak-color-btn" data-color="#8AA2C6" style="background:#8AA2C6" title="Slate Blue"></button>
      <button class="tweak-color-btn" data-color="#AC9CCE" style="background:#AC9CCE" title="Lavender"></button>
      <button class="tweak-color-btn" data-color="#82BBB1" style="background:#82BBB1" title="Teal"></button>
      <button class="tweak-color-btn" data-color="#CB9D7F" style="background:#CB9D7F" title="Clay"></button>
      <button class="tweak-color-btn" data-color="#5E5851" style="background:#5E5851" title="Soft Ink"></button>
      <!-- Custom picker -->
      <div class="tweak-color-custom" title="Custom color" id="tweak-custom-wrap">
        <div class="tweak-color-custom-preview" id="tweak-custom-preview" style="background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red)"></div>
        <input type="color" id="tweak-color-custom-input" value="#93B89C">
      </div>
    </div>
  </div>

  <hr class="tweak-divider">

  <!-- Border radius -->
  <div class="tweak-section">
    <div class="tweak-label">Corner Radius <span id="radius-val">100%</span></div>
    <input type="range" class="tweak-slider" id="tweak-radius" min="0" max="2" step="0.05" value="1">
  </div>

  <hr class="tweak-divider">

  <!-- Typeface -->
  <div class="tweak-section">
    <div class="tweak-label">Typeface</div>
    <div class="tweak-font-grid" id="tweak-fonts">
      <button class="tweak-font-btn active" data-font="system" style="font-family:-apple-system,system-ui">System UI</button>
      <button class="tweak-font-btn" data-font="nunito" style="font-family:'Nunito'">Rounded</button>
      <button class="tweak-font-btn" data-font="dm" style="font-family:'DM Sans'">DM Sans</button>
      <button class="tweak-font-btn" data-font="serif" style="font-family:'Noto Serif SC'">Serif 宋</button>
    </div>
  </div>
</div>

<!-- Data -->
<script src="emotions-data.js?v=20260617c"></script>

<!-- Components -->
<script type="text/babel" src="ui-kit.jsx?v=20260618c"></script>
<script type="text/babel" src="home-screen.jsx?v=20260617b"></script>
<script type="text/babel" src="record-flow.jsx?v=20260617a"></script>
<script type="text/babel" src="review-screen.jsx?v=20260618b"></script>
<script type="text/babel" src="settings-sheet.jsx?v=20260617d"></script>

<!-- Main App -->
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#93B89C",
  "radius": 1,
  "typeface": "system"
}/*EDITMODE-END*/;

const FONT_MAP = {
  system:  '-apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif',
  nunito:  '"Nunito", system-ui, sans-serif',
  dm:      '"DM Sans", system-ui, sans-serif',
  serif:   '"Noto Serif SC", Georgia, serif',
};

// ── Color helpers ─────────────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function lightenHex(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  const mix = v => Math.round(v + (255-v)*amt);
  return `#${[mix(r),mix(g),mix(b)].map(v=>v.toString(16).padStart(2,'0')).join('')}`;
}

// ── Apply tweaks to globals ───────────────────────────────────
function applyTweaks({ accentColor, radius, typeface }) {
  window.C.primary  = accentColor;
  window.C.primaryL = lightenHex(accentColor, 0.72);
  window.RM_R       = radius;
  window.RM_FONT    = FONT_MAP[typeface] || FONT_MAP.system;
}

// Init globals — apply the persisted tweaks (incl. accent) at first paint
window.RM_R    = TWEAK_DEFAULTS.radius;
window.RM_FONT = FONT_MAP[TWEAK_DEFAULTS.typeface];
applyTweaks(TWEAK_DEFAULTS);

// ── Root App ──────────────────────────────────────────────────
function RecordMeApp() {
  const [tweakKey,   setTweakKey]   = React.useState(0);
  const [tweaks,     setTweaksState] = React.useState(TWEAK_DEFAULTS);
  const [tab,        setTab]         = React.useState('home');
  const [showRecord, setShowRecord]  = React.useState(false);
  const [showWin,    setShowWin]     = React.useState(false);
  const [showSettings, setShowSettings] = React.useState(false);
  const [entries,    setEntries]     = React.useState(() => {
    try {
      const s = localStorage.getItem('recordme_entries');
      if (s) return JSON.parse(s).map(e => ({ ...e, ts: new Date(e.ts) }));
    } catch(e) {}
    return [];
  });
  const [wins, setWins] = React.useState(() => {
    try {
      const s = localStorage.getItem('recordme_wins');
      if (s) return JSON.parse(s).map(w => ({ ...w, ts: new Date(w.ts) }));
    } catch(e) {}
    return [];
  });
  const [detailEntry, setDetailEntry] = React.useState(null);

  React.useEffect(() => {
    localStorage.setItem('recordme_entries', JSON.stringify(entries));
  }, [entries]);

  React.useEffect(() => {
    localStorage.setItem('recordme_wins', JSON.stringify(wins));
  }, [wins]);

  React.useEffect(() => {
    window.__setAppTweaks = (next) => {
      applyTweaks(next);
      setTweaksState(next);
      setTweakKey(k => k + 1);
    };
  }, []);

  function addEntry(e) { setEntries(p => [e, ...p]); setShowRecord(false); }
  function openEntry(e) { setDetailEntry(e); }
  function addWin(text) { setWins(p => [...p, { id: Date.now(), text, ts: new Date() }]); }
  function deleteWin(id) { setWins(p => p.filter(w => w.id !== id)); }

  const font = FONT_MAP[tweaks.typeface] || FONT_MAP.system;

  return (
    <div key={tweakKey} style={{
      position: 'relative', width: '100%', height: '100%',
      fontFamily: font, background: C.bg, WebkitFontSmoothing: 'antialiased',
    }}>
      {tab === 'home'   && <HomeScreen   entries={entries} wins={wins} onSeeAllWins={() => setTab('review')} onOpenSettings={() => setShowSettings(true)} />}
      {tab === 'review'  && <ReviewScreen entries={entries} wins={wins} openEntry={openEntry} />}

      {/* Record modal overlay */}
      {showRecord && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 200, background: C.bg }}>
          <RecordScreen onSave={addEntry} onClose={() => setShowRecord(false)} />
        </div>
      )}

      <TabBar tab={tab} setTab={setTab} />

      {/* Dual-entry FAB — 记心情（主）/ ★ 记收获（次）— only on home tab */}
      {!showRecord && tab === 'home' && (
        <SplitFab onMood={() => setShowRecord(true)} onWin={() => setShowWin(true)} />
      )}

      {/* Win quick-entry sheet */}
      {showWin && <WinQuickSheet onSave={addWin} onClose={() => setShowWin(false)} />}

      {detailEntry && <EntryDetailSheet entry={detailEntry} onClose={() => setDetailEntry(null)} />}

      {showSettings && <AccountSheet entries={entries} wins={wins} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

// ── Entry Detail Sheet ────────────────────────────────────────
function EntryDetailSheet({ entry, onClose }) {
  const em = EMOTIONS.find(e => e.id === entry.emotionId);
  if (!em) return null;
  const timeStr = entry.ts.toLocaleString('zh-CN', {
    month: 'long', day: 'numeric', weekday: 'short',
    hour: '2-digit', minute: '2-digit',
  });
  const entryTags = (entry.tags || []).map(id => TAGS.find(t => t.id === id)).filter(Boolean);
  const customTags = entry.customTags || [];

  function Field({ label, value }) {
    if (!value) return null;
    return (
      <div style={{ marginBottom: 16 }}>
        <p style={{ margin:'0 0 6px', fontSize:11, fontWeight:700, color:C.text3, letterSpacing:'0.08em', textTransform:'uppercase' }}>{label}</p>
        <p style={{ margin:0, fontSize:15, color:C.text, lineHeight:1.65 }}>{value}</p>
      </div>
    );
  }

  return (
    <div style={{
      position:'absolute', inset:0, zIndex:300,
      background:'rgba(61,43,31,0.38)', backdropFilter:'blur(6px)',
      display:'flex', flexDirection:'column', justifyContent:'flex-end',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background:C.surface, borderRadius:`${r(28)}px ${r(28)}px 0 0`,
        padding:'12px 22px 48px',
        boxShadow:'0 -8px 40px rgba(61,43,31,0.15)',
        maxHeight:'85%', overflowY:'auto',
      }}>
        <div style={{ width:36, height:4, borderRadius:2, background:C.border, margin:'0 auto 20px' }}/>

        {/* Emotion header */}
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
          <div style={{
            width:50, height:50, borderRadius:r(16),
            background:em.color, flexShrink:0,
            display:'flex', alignItems:'center', justifyContent:'center',
          }}>
            <div style={{ width:18, height:18, borderRadius:'50%', background:'rgba(255,255,255,0.35)' }}/>
          </div>
          <div>
            <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:em.color }}>{em.name}</h2>
            <p style={{ margin:0, fontSize:12, color:C.text3 }}>{timeStr} · {QUADRANTS[em.quadrant]?.label}</p>
          </div>
        </div>

        {/* Tags */}
        {(entryTags.length > 0 || customTags.length > 0) && (
          <div style={{ marginBottom:16 }}>
            <p style={{ margin:'0 0 8px', fontSize:11, fontWeight:700, color:C.text3, letterSpacing:'0.08em', textTransform:'uppercase' }}>相关情境</p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
              {entryTags.map(tag => (
                <div key={tag.id} style={{
                  display:'flex', alignItems:'center', gap:5, padding:'5px 10px',
                  background:C.surface2, borderRadius:r(20),
                }}>
                  <svg width="12" height="12" viewBox="0 0 24 24"
                    style={{ color:C.text2, flexShrink:0 }}
                    dangerouslySetInnerHTML={{ __html: tag.icon }}
                  />
                  <span style={{ fontSize:12, color:C.text2, fontWeight:500 }}>{tag.name}</span>
                </div>
              ))}
              {customTags.map(name => (
                <div key={name} style={{ padding:'5px 10px', background:C.surface2, borderRadius:r(20), fontSize:12, color:C.text2 }}>{name}</div>
              ))}
            </div>
          </div>
        )}

        <Field label="触发事件" value={entry.event} />
        <Field label="内心感受" value={entry.feeling} />
        <Field label="认知" value={entry.cognition} />

        {/* Emotion meaning */}
        <div style={{
          background:em.bg, borderRadius:r(16), padding:'14px 16px',
          borderLeft:`3px solid ${em.color}`,
        }}>
          <p style={{ margin:'0 0 5px', fontSize:11, fontWeight:700, color:em.color, letterSpacing:'0.08em', textTransform:'uppercase' }}>情绪告诉你</p>
          <p style={{ margin:0, fontSize:13, color:C.text, lineHeight:1.6 }}>{em.func}</p>
        </div>
      </div>
    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('mount'));
root.render(
  <IOSDevice dark={false}>
    <RecordMeApp />
  </IOSDevice>
);
</script>

<!-- ── Tweaks panel logic (vanilla JS) ──────────────────────── -->
<script>
(function() {
  const panel  = document.getElementById('tweaks-panel');
  const slider = document.getElementById('tweak-radius');
  const radVal = document.getElementById('radius-val');
  const colWrap = document.getElementById('tweak-colors');
  const fontWrap = document.getElementById('tweak-fonts');
  const customInput   = document.getElementById('tweak-color-custom-input');
  const customPreview = document.getElementById('tweak-custom-preview');
  const customWrap    = document.getElementById('tweak-custom-wrap');

  let state = Object.assign({}, {accentColor:'#93B89C', radius:1, typeface:'system'});

  function push() {
    if (window.__setAppTweaks) window.__setAppTweaks(Object.assign({}, state));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: {
      accentColor: state.accentColor,
      radius: state.radius,
      typeface: state.typeface,
    }}, '*');
    // Update slider thumb color
    slider.style.setProperty('--thumb', state.accentColor);
    document.querySelectorAll('.tweak-slider::-webkit-slider-thumb').forEach(()=>{});
    // Just re-color via inline style trick on a stylesheet
    let st = document.getElementById('tweak-dyn-style');
    if (!st) { st = document.createElement('style'); st.id = 'tweak-dyn-style'; document.head.appendChild(st); }
    st.textContent = `
      .tweak-slider::-webkit-slider-thumb { background: ${state.accentColor} !important; }
      .tweak-font-btn.active { border-color: ${state.accentColor} !important; background: ${state.accentColor}18 !important; color: ${state.accentColor} !important; }
      .tweak-color-btn.active { border-color: #2D2B28 !important; }
    `;
  }

  // Color swatches
  colWrap.addEventListener('click', e => {
    const btn = e.target.closest('[data-color]');
    if (!btn) return;
    colWrap.querySelectorAll('.tweak-color-btn').forEach(b => b.classList.remove('active'));
    customWrap.classList.remove('active');
    btn.classList.add('active');
    state.accentColor = btn.dataset.color;
    customInput.value = state.accentColor;
    push();
  });

  // Custom color picker
  customInput.addEventListener('input', e => {
    const col = e.target.value;
    customPreview.style.background = col;
    customWrap.style.borderColor = col;
    colWrap.querySelectorAll('.tweak-color-btn').forEach(b => b.classList.remove('active'));
    state.accentColor = col;
    push();
  });
  customWrap.addEventListener('click', () => customInput.click());

  // Radius slider
  slider.addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    state.radius = v;
    radVal.textContent = Math.round(v * 100) + '%';
    push();
  });

  // Font buttons
  fontWrap.addEventListener('click', e => {
    const btn = e.target.closest('[data-font]');
    if (!btn) return;
    fontWrap.querySelectorAll('.tweak-font-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.typeface = btn.dataset.font;
    push();
  });

  // Edit mode messages
  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode')   { panel.classList.add('visible'); }
    if (e.data?.type === '__deactivate_edit_mode') { panel.classList.remove('visible'); }
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
})();
</script>
</body>
</html>
