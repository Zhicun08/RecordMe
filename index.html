<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Record.me</title>

<!-- PWA / Add to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Record.me">
<meta name="theme-color" content="#F4F2EF">
<link rel="manifest" href="Record.me.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #F4F2EF;
    font-family: -apple-system, system-ui, sans-serif;
    overscroll-behavior: none;
  }
  body { position: fixed; inset: 0; overflow: hidden; }
  ::-webkit-scrollbar { width: 0px; }
  textarea, input, button { font-family: inherit; }
  /* Full-viewport app surface, honoring iOS safe areas */
  #mount {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #F4F2EF;
  }
</style>
</head>
<body>

<div id="mount"></div>

<!-- Splash thumbnail for offline bundle -->
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0936B"/><stop offset="1" stop-color="#C9744C"/>
    </linearGradient></defs>
    <rect width="512" height="512" fill="url(#bg)"/>
    <circle cx="256" cy="256" r="154" fill="none" stroke="rgba(253,248,243,0.55)" stroke-width="18"/>
    <circle cx="256" cy="256" r="105" fill="#FDF8F3"/>
    <circle cx="256" cy="256" r="44" fill="#C9744C"/>
  </svg>
</template>

<!-- Data -->
<script src="emotions-data.js"></script>

<!-- Cloud sync (Supabase) -->
<script src="supabase-config.js"></script>
<script src="cloud-sync.js"></script>

<!-- Shared components / screens (same files as the prototype) -->
<script type="text/babel" src="ui-kit.jsx?v=20260623d"></script>
<script type="text/babel" src="home-screen.jsx?v=20260623d"></script>
<script type="text/babel" src="record-flow.jsx?v=20260623d"></script>
<script type="text/babel" src="review-screen.jsx?v=20260623d"></script>
<script type="text/babel" src="auth-screen.jsx?v=20260623d"></script>

<!-- Root app (frameless) -->
<script type="text/babel">

// Locked-in look (matches the user's saved Tweaks)
const FONT_MAP = {
  system:  '-apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif',
  nunito:  '"Nunito", system-ui, sans-serif',
  dm:      '"DM Sans", system-ui, sans-serif',
  serif:   '"Noto Serif SC", Georgia, serif',
};
const APP_LOOK = { accentColor: "#8B8478", radius: 1.2, typeface: "system" };

// User-selectable theme colors — muted Morandi tones (soft, grayed, warm)
window.ACCENT_OPTIONS = [
  { id: "ink",   name: "黛",   hex: "#8B8478" },
  { id: "blue",  name: "雾蓝", hex: "#8AA1AC" },
  { id: "green", name: "灰绿", hex: "#9DAA8C" },
  { id: "clay",  name: "陶",   hex: "#C39684" },
  { id: "plum",  name: "藕",   hex: "#BA9499" },
  { id: "gold",  name: "杏",   hex: "#C3AB7D" },
];

function hexToRgb(hex){const h=hex.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function lightenHex(hex,amt){const [r,g,b]=hexToRgb(hex);const mix=v=>Math.round(v+(255-v)*amt);return `#${[mix(r),mix(g),mix(b)].map(v=>v.toString(16).padStart(2,'0')).join('')}`;}

// Apply an accent hex to the shared color object (read at render time by all components)
window.applyAccent = function(hex){
  window.C.primary  = hex;
  window.C.primaryL = lightenHex(hex, 0.72);
};

// Restore the saved color, falling back to the default
function loadAccent(){
  try { const s = localStorage.getItem('recordme_accent'); if (s) return s; } catch(e) {}
  return APP_LOOK.accentColor;
}

window.applyAccent(loadAccent());
window.RM_R       = APP_LOOK.radius;
window.RM_FONT    = FONT_MAP[APP_LOOK.typeface];

// One-time data reset: open the app with ?reset to wipe all records and start blank
if (/[?&]reset\b/i.test(location.search)) {
  try { localStorage.removeItem('recordme_entries'); localStorage.removeItem('recordme_wins'); } catch(e) {}
  try { history.replaceState(null, '', location.pathname); } catch(e) {}
}

function RecordMeApp() {
  const [tab,        setTab]        = React.useState('home');
  const [showRecord, setShowRecord] = React.useState(false);
  const [showWin,    setShowWin]    = React.useState(false);
  const [showSettings, setShowSettings] = React.useState(false);
  const [session,    setSession]    = React.useState(undefined); // undefined=loading, null=signed out, obj=signed in
  const [syncState,  setSyncState]  = React.useState('idle');
  const [entries, setEntries] = React.useState(() => {
    try { const s = localStorage.getItem('recordme_entries'); if (s) return JSON.parse(s).map(e => ({ ...e, ts: new Date(e.ts) })); } catch(e) {}
    return [];
  });
  const [wins, setWins] = React.useState(() => {
    try { const s = localStorage.getItem('recordme_wins'); if (s) return JSON.parse(s).map(w => ({ ...w, ts: new Date(w.ts) })); } catch(e) {}
    return [];
  });
  const [detailEntry, setDetailEntry] = React.useState(null);
  const [accent, setAccent] = React.useState(() => C.primary);

  function changeAccent(hex){
    window.applyAccent(hex);
    try { localStorage.setItem('recordme_accent', hex); } catch(e) {}
    setAccent(hex); // re-render whole tree so all C.primary reads update
  }

  // Keep live refs so sync can read latest local state without stale closures
  const entriesRef = React.useRef(entries); entriesRef.current = entries;
  const winsRef = React.useRef(wins); winsRef.current = wins;

  React.useEffect(() => { localStorage.setItem('recordme_entries', JSON.stringify(entries)); }, [entries]);
  React.useEffect(() => { localStorage.setItem('recordme_wins', JSON.stringify(wins)); }, [wins]);

  // Init Supabase + watch auth state
  React.useEffect(() => {
    RMCloud.init();
    RMCloud.getSession().then(s => setSession(s));
    RMCloud.onAuth(s => setSession(s));
  }, []);

  // Merge two record arrays by id (append-only → union, newest first)
  function mergeById(a, b) {
    const map = new Map();
    for (const x of [...a, ...b]) if (x && x.id != null) map.set(String(x.id), x);
    return [...map.values()].sort((p, q) => new Date(q.ts) - new Date(p.ts));
  }

  // Full two-way sync: pull cloud, merge, push local-only
  async function syncAll() {
    if (!RMCloud.ready) return;
    setSyncState('syncing');
    try {
      const { entries: cE, wins: cW } = await RMCloud.pull();
      const localE = entriesRef.current, localW = winsRef.current;
      const mergedE = mergeById(localE, cE);
      const mergedW = mergeById(localW, cW);
      setEntries(mergedE); setWins(mergedW);
      const cloudEids = new Set(cE.map(e => String(e.id)));
      const cloudWids = new Set(cW.map(w => String(w.id)));
      await RMCloud.pushMany('entry', localE.filter(e => !cloudEids.has(String(e.id))));
      await RMCloud.pushMany('win',   localW.filter(w => !cloudWids.has(String(w.id))));
      setSyncState('synced');
    } catch (e) {
      console.warn('[sync] failed', e);
      setSyncState('offline');
    }
  }

  // Sync whenever we become signed in
  React.useEffect(() => {
    if (session && session.user) syncAll();
    else if (session === null) setSyncState('idle');
  }, [session && session.user && session.user.id]);

  function addEntry(e) {
    setEntries(p => [e, ...p]); setShowRecord(false);
    if (session) RMCloud.push('entry', e).then(() => setSyncState('synced')).catch(() => setSyncState('offline'));
  }
  function openEntry(e) { setDetailEntry(e); }
  function addWin(text) {
    const w = { id: Date.now() + '-' + Math.random().toString(36).slice(2, 7), text, ts: new Date() };
    setWins(p => [...p, w]);
    if (session) RMCloud.push('win', w).then(() => setSyncState('synced')).catch(() => setSyncState('offline'));
  }

  async function handleSignOut() {
    await RMCloud.signOut();
    setShowSettings(false);
    setSession(null);
  }

  if (session === undefined) return <RMSplash />;
  if (session === null)      return <AuthScreen />;

  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      fontFamily: FONT_MAP[APP_LOOK.typeface], background: C.bg, WebkitFontSmoothing: 'antialiased',
    }}>
      {tab === 'home'   && <HomeScreen   entries={entries} wins={wins} onSeeAllWins={() => setTab('review')} onOpenSettings={() => setShowSettings(true)} />}
      {tab === 'review' && <ReviewScreen entries={entries} wins={wins} openEntry={openEntry} />}

      {showRecord && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 200, background: C.bg }}>
          <RecordScreen onSave={addEntry} onClose={() => setShowRecord(false)} />
        </div>
      )}

      <TabBar tab={tab} setTab={setTab} />

      {!showRecord && tab === 'home' && (
        <SplitFab onMood={() => setShowRecord(true)} onWin={() => setShowWin(true)} />
      )}
      {showWin && <WinQuickSheet onSave={addWin} onClose={() => setShowWin(false)} />}
      {detailEntry && <EntryDetailSheet entry={detailEntry} onClose={() => setDetailEntry(null)} />}
      {showSettings && (
        <SettingsSheet
          email={session.user && session.user.email}
          syncState={syncState}
          entries={entries} wins={wins}
          accent={accent} onAccent={changeAccent}
          onResync={syncAll}
          onSignOut={handleSignOut}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}

function EntryDetailSheet({ entry, onClose }) {
  const em = EMOTIONS.find(e => e.id === entry.emotionId);
  if (!em) return null;
  const timeStr = entry.ts.toLocaleString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short', hour: '2-digit', minute: '2-digit' });
  const entryTags = (entry.tags || []).map(id => TAGS.find(t => t.id === id)).filter(Boolean);
  const customTags = entry.customTags || [];

  function Field({ label, value }) {
    if (!value) return null;
    return (
      <div style={{ marginBottom: 16 }}>
        <p style={{ margin:'0 0 6px', fontSize:11, fontWeight:700, color:C.text3, letterSpacing:'0.08em', textTransform:'uppercase' }}>{label}</p>
        <p style={{ margin:0, fontSize:15, color:C.text, lineHeight:1.65 }}>{value}</p>
      </div>
    );
  }

  return (
    <div style={{
      position:'absolute', inset:0, zIndex:300,
      background:'rgba(61,43,31,0.38)', backdropFilter:'blur(6px)',
      display:'flex', flexDirection:'column', justifyContent:'flex-end',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background:C.surface, borderRadius:`${r(28)}px ${r(28)}px 0 0`,
        padding:'12px 22px calc(48px + env(safe-area-inset-bottom))',
        boxShadow:'0 -8px 40px rgba(61,43,31,0.15)', maxHeight:'85%', overflowY:'auto',
      }}>
        <div style={{ width:36, height:4, borderRadius:2, background:C.border, margin:'0 auto 20px' }}></div>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
          <div style={{ width:50, height:50, borderRadius:r(16), background:em.color, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <div style={{ width:18, height:18, borderRadius:'50%', background:'rgba(255,255,255,0.35)' }}></div>
          </div>
          <div>
            <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:em.color }}>{em.name}</h2>
            <p style={{ margin:0, fontSize:12, color:C.text3 }}>{timeStr} · {QUADRANTS[em.quadrant]?.label}</p>
          </div>
        </div>
        {(entryTags.length > 0 || customTags.length > 0) && (
          <div style={{ marginBottom:16 }}>
            <p style={{ margin:'0 0 8px', fontSize:11, fontWeight:700, color:C.text3, letterSpacing:'0.08em', textTransform:'uppercase' }}>相关情境</p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
              {entryTags.map(tag => (
                <div key={tag.id} style={{ display:'flex', alignItems:'center', gap:5, padding:'5px 10px', background:C.surface2, borderRadius:r(20) }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" style={{ color:C.text2, flexShrink:0 }} dangerouslySetInnerHTML={{ __html: tag.icon }}></svg>
                  <span style={{ fontSize:12, color:C.text2, fontWeight:500 }}>{tag.name}</span>
                </div>
              ))}
              {customTags.map(name => (
                <div key={name} style={{ padding:'5px 10px', background:C.surface2, borderRadius:r(20), fontSize:12, color:C.text2 }}>{name}</div>
              ))}
            </div>
          </div>
        )}
        <Field label="触发事件" value={entry.event} />
        <Field label="内心感受" value={entry.feeling} />
        <Field label="认知" value={entry.cognition} />
        <div style={{ background:em.bg, borderRadius:r(16), padding:'14px 16px', borderLeft:`3px solid ${em.color}` }}>
          <p style={{ margin:'0 0 5px', fontSize:11, fontWeight:700, color:em.color, letterSpacing:'0.08em', textTransform:'uppercase' }}>情绪告诉你</p>
          <p style={{ margin:0, fontSize:13, color:C.text, lineHeight:1.6 }}>{em.func}</p>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('mount'));
root.render(<RecordMeApp />);
</script>

</body>
</html>
